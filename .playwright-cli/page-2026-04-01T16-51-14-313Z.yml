      - paragraph [ref=e20]: Full-service support for investors doing fix and flips, rental renovations, multifamily rehabs, full gut projects, and new construction. We help source, analyze, finance, plan, and execute projects across Philadelphia and surrounding Pennsylvania suburbs.
